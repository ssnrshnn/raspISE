<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RaspISE — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body {
      background: radial-gradient(ellipse at top, #0d1b2a, #000);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 44px 40px;
      width: 100%; max-width: 380px;
      backdrop-filter: blur(10px);
    }
    .brand-icon {
      width: 56px; height: 56px;
      background: rgba(13, 202, 240, 0.12);
      border: 1px solid rgba(13, 202, 240, 0.3);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand-icon">
      <svg width="30" height="30" viewBox="0 0 52 52" fill="none">
        <circle cx="26" cy="26" r="25" stroke="#0dcaf0" stroke-width="2"/>
        <path d="M14 26 Q26 10 38 26 Q26 42 14 26Z" fill="none" stroke="#0dcaf0" stroke-width="1.8"/>
        <circle cx="26" cy="26" r="4" fill="#0dcaf0"/>
      </svg>
    </div>
    <h4 class="text-center fw-bold mb-1">RaspISE</h4>
    <p class="text-center text-muted small mb-4">Admin Console</p>

    {% if error %}
    <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label small text-muted">Username</label>
        <input type="text" name="username" class="form-control" autofocus required autocomplete="username">
      </div>
      <div class="mb-3">
        <label class="form-label small text-muted">Password</label>
        <input type="password" name="password" class="form-control" required autocomplete="current-password">
      </div>
      <div class="mb-4" id="totp-group" style="{% if not totp_required %}display:none{% endif %}">
        <label class="form-label small text-muted">Authenticator Code</label>
        <input type="text" name="totp_code" class="form-control" inputmode="numeric" pattern="[0-9]{6}"
               maxlength="6" autocomplete="one-time-code" placeholder="6-digit code">
      </div>
      <button type="submit" class="btn btn-info w-100 fw-semibold">Sign In</button>
      <div class="text-center mt-2">
        <a href="#" class="text-muted small" id="show-totp" style="{% if totp_required %}display:none{% endif %}"
           onclick="document.getElementById('totp-group').style.display='block';this.style.display='none';return false;">
          Have a 2FA code?
        </a>
      </div>
    </form>

    <p class="text-center text-muted mt-3" style="font-size:.75rem">
      Network Access Control · RaspISE v1.0
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
